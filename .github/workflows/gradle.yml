name: Java CI with Gradle

on: [push, pull_request]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Принудительно использовать Node.js 24

jobs:
  build:
    runs-on: ubuntu-latest  # Робот работает на Linux

    steps:
      # 1. Обновлённые программы (actions)
      - uses: actions/checkout@v4.1.1  # Новая версия
      - uses: actions/setup-java@v4.2.1  # Новая версия
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v3  # Новая версия

      # 2. Дать права файлу gradlew
      - name: Дать права файлу gradlew
        run: chmod +x ./gradlew

      # 3. Кэширование (временные файлы)
      - name: Сохранить кэш Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper/dists
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
        continue-on-error: true  # Продолжать, если кэш не сохраняется

      # 4. Проверка версий (для отладки)
      - name: Показать версию Java
        run: java -version

      - name: Показать версию Gradle
        run: ./gradlew --version

      # 5. Сборка проекта
      - name: Собрать проект
        run: ./gradlew build

      # 6. Отправить информацию о зависимостях (если включён Dependency Graph)
      - name: Отправить Dependency Graph
        uses: gradle/actions/dependency-submission@v3
        continue-on-error: true  # Продолжать, если Dependency Graph отключён
